<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercury</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-hover: #1c2128;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --radius: 6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Layout ─────────────────────────────────────────────────────────── */

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */

    .header {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo .wing { font-size: 20px; }

    /* ─── Health Banner ──────────────────────────────────────────────────── */

    .health-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      font-size: 13px;
    }

    .health-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .health-status.healthy { color: var(--green); }
    .health-status.degraded { color: var(--yellow); }
    .health-status.critical { color: var(--red); }

    .health-icon { font-size: 14px; }

    .health-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--text-muted);
    }

    .connection {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .connection::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .connection.disconnected::before { background: var(--red); }

    /* ─── Navigation ─────────────────────────────────────────────────────── */

    .nav {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .nav-item {
      padding: 10px 16px;
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .nav-item:hover { color: var(--text); }

    .nav-item.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
    }

    /* ─── Panels ─────────────────────────────────────────────────────────── */

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      background: var(--bg-secondary);
    }

    .panel-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-body { padding: 12px 16px; }

    /* ─── Grid ───────────────────────────────────────────────────────────── */

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* ─── Stats ──────────────────────────────────────────────────────────── */

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ─── Tables ─────────────────────────────────────────────────────────── */

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
    }

    .table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
    }

    .table tr:last-child td { border-bottom: none; }

    .table tr.clickable { cursor: pointer; }
    .table tr.clickable:hover { background: var(--bg-hover); }

    .table .actions { white-space: nowrap; }

    /* ─── Rows ───────────────────────────────────────────────────────────── */

    .adapter-row, .task-row, .role-row, .active-run {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .adapter-row:last-child, .task-row:last-child, 
    .role-row:last-child, .active-run:last-child { border-bottom: none; }

    .activity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .activity-row:hover { background: var(--bg-hover); margin: 0 -16px; padding: 8px 16px; }
    .activity-row:last-child { border-bottom: none; }

    .activity-row .time { color: var(--text-muted); min-width: 60px; font-size: 12px; }
    .activity-row .preview { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ─── Messages ───────────────────────────────────────────────────────── */

    .messages-list {
      max-height: 500px;
      overflow-y: auto;
    }

    .message {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .message:last-child { border-bottom: none; }

    .message-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .message-content {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.assistant { background: rgba(88, 166, 255, 0.05); }
    .message.user { background: rgba(63, 185, 80, 0.05); }

    /* ─── Logs ───────────────────────────────────────────────────────────── */

    .logs-list {
      max-height: 600px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
    }

    .log-row {
      display: flex;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .log-row:last-child { border-bottom: none; }
    .log-row .time { color: var(--text-muted); min-width: 80px; }
    .log-row .level { min-width: 50px; font-weight: 500; }
    .log-row .level.info { color: var(--accent); }
    .log-row .level.error { color: var(--red); }
    .log-row .level.warn { color: var(--yellow); }
    .log-row .source { color: var(--text-muted); min-width: 80px; }
    .log-row .message { flex: 1; }

    /* ─── Elements ───────────────────────────────────────────────────────── */

    .badge {
      display: inline-block;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge.green { border-color: var(--green); color: var(--green); }
    .badge.pulse { animation: pulse 2s ease-in-out infinite; background: var(--yellow); border-color: var(--yellow); color: var(--bg); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }

    .btn-sm { padding: 4px 8px; font-size: 12px; }
    .btn-danger:hover { border-color: var(--red); color: var(--red); }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status.connected::before { background: var(--green); }
    .status.active::before { background: var(--yellow); animation: pulse 1s ease-in-out infinite; }

    .role { font-weight: 500; font-size: 12px; }
    .role.user { color: var(--accent); }
    .role.assistant { color: var(--green); }
    .role.ambient { color: var(--text-muted); }

    .mono { font-family: 'SF Mono', 'Fira Code', monospace; color: var(--accent); }
    .muted { color: var(--text-muted); }
    .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .empty, .empty-small { 
      color: var(--text-muted); 
      font-style: italic; 
      text-align: center; 
    }
    .empty { padding: 24px 0; }
    .empty-small { padding: 12px 0; }

    .link {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
    }

    .link:hover { text-decoration: underline; }

    .back {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
    }

    .back:hover { color: var(--text); }

    /* ─── Page Header ────────────────────────────────────────────────────── */

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .page-header h2 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box input, .select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      width: 200px;
    }

    .search-box input:focus, .select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ─── Responsive ─────────────────────────────────────────────────────── */

    @media (max-width: 768px) {
      .shell { padding: 0 12px; }
      .header { flex-direction: column; gap: 12px; }
      .health-banner { flex-direction: column; gap: 8px; }
      .nav { overflow-x: auto; }
      .nav-item { padding: 10px 12px; white-space: nowrap; }
      .page-header { flex-direction: column; gap: 12px; align-items: flex-start; }
      .search-box input { width: 100%; }
    }
  </style>
</head>
<body hx-ext="sse" sse-connect="/dashboard/events">
  <div class="shell">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo"><span class="wing">🪽</span> MERCURY</div>
      </div>
      <div id="active-count" sse-swap="active-count"></div>
    </div>

    <!-- Health Banner -->
    <div class="health-banner" id="health" sse-swap="health">
      <div class="health-status">
        <span class="health-icon">⏳</span>
        <span class="health-message">Connecting...</span>
      </div>
      <div class="health-meta">
        <span class="connection" id="connection">live</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="nav" id="nav">
      <a class="nav-item active" 
         hx-get="/dashboard/page/overview" 
         hx-target="#main" 
         hx-push-url="true"
         onclick="setActiveNav(this)">Overview</a>
      <a class="nav-item" 
         hx-get="/dashboard/page/groups" 
         hx-target="#main" 
         hx-push-url="true"
         onclick="setActiveNav(this)">Groups</a>
      <a class="nav-item" 
         hx-get="/dashboard/page/tasks" 
         hx-target="#main" 
         hx-push-url="true"
         onclick="setActiveNav(this)">Tasks</a>
      <a class="nav-item" 
         hx-get="/dashboard/page/permissions" 
         hx-target="#main" 
         hx-push-url="true"
         onclick="setActiveNav(this)">Permissions</a>
      <a class="nav-item" 
         hx-get="/dashboard/page/logs" 
         hx-target="#main" 
         hx-push-url="true"
         onclick="setActiveNav(this)">Logs</a>
    </nav>

    <!-- Main Content -->
    <main id="main" hx-get="/dashboard/page/overview" hx-trigger="load">
      <div class="empty">Loading...</div>
    </main>
  </div>

  <script>
    // Navigation
    function setActiveNav(el) {
      for (const item of document.querySelectorAll('.nav-item')) {
        item.classList.remove('active');
      }
      el.classList.add('active');
    }

    // Handle browser back/forward
    window.addEventListener('popstate', () => {
      const path = window.location.pathname;
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        const href = item.getAttribute('hx-get');
        if (path.includes(href.replace('/dashboard/page/', ''))) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    });

    // SSE connection state
    const connectionEl = document.getElementById('connection');
    
    document.body.addEventListener('htmx:sseOpen', () => {
      connectionEl.textContent = 'live';
      connectionEl.classList.remove('disconnected');
    });

    document.body.addEventListener('htmx:sseError', () => {
      connectionEl.textContent = 'reconnecting...';
      connectionEl.classList.add('disconnected');
    });

    document.body.addEventListener('htmx:sseClose', () => {
      connectionEl.textContent = 'disconnected';
      connectionEl.classList.add('disconnected');
    });

    // Table search filter
    function filterTable(input, tableId) {
      const filter = input.value.toLowerCase();
      const table = document.getElementById(tableId);
      const rows = table.querySelectorAll('tbody tr');
      
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(filter) ? '' : 'none';
      });
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Don't trigger when typing in inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      const navItems = document.querySelectorAll('.nav-item');
      
      if (e.key === '1') navItems[0]?.click();
      if (e.key === '2') navItems[1]?.click();
      if (e.key === '3') navItems[2]?.click();
      if (e.key === '4') navItems[3]?.click();
      if (e.key === '5') navItems[4]?.click();
      if (e.key === '?') alert('Keyboard shortcuts:\n1-5: Navigate tabs\n/: Focus search');
      if (e.key === '/') {
        e.preventDefault();
        document.querySelector('input[type="text"]')?.focus();
      }
    });

    // Refresh current page after htmx actions (like delete, pause, etc.)
    document.body.addEventListener('htmx:afterRequest', (e) => {
      if (e.detail.requestConfig.verb !== 'get') {
        // Refresh the current page after mutations
        setTimeout(() => {
          const activeNav = document.querySelector('.nav-item.active');
          if (activeNav) activeNav.click();
        }, 100);
      }
    });

    // Handle hash-based navigation on page load (for refresh support)
    window.addEventListener('DOMContentLoaded', () => {
      const hash = window.location.hash.slice(1); // Remove #
      if (hash) {
        // Find the nav item that matches and click it
        const navItems = document.querySelectorAll('.nav-item');
        let found = false;
        for (const item of navItems) {
          const href = item.getAttribute('hx-get');
          if (href && href.includes(hash.split('/')[0])) {
            item.click();
            found = true;
            break;
          }
        }
        // If it's a detail page (e.g., groups/id), load it directly
        if (!found && hash.includes('/')) {
          htmx.ajax('GET', `/dashboard/page/${hash}`, '#main');
        }
      }
    });
  </script>
</body>
</html>
